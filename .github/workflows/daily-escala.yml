name: Atualizar Escala Diária HRO

on:
  # Horário de Brasília = UTC-3.
  # REQUISITO: a escala do dia precisa estar atualizada ATÉ 07h15 BRT, pois
  # é quando o plantonista entra.
  #
  # GATILHO PRINCIPAL (garantia do horário): repository_dispatch acionado por um
  # agendador EXTERNO confiável (ex: cron-job.org), que dispara num horário fixo
  # sem sofrer a fila/atraso do GitHub Actions. Configure o agendador para chamar:
  #   POST https://api.github.com/repos/<owner>/<repo>/dispatches
  #   Header: Authorization: Bearer <PAT com escopo repo>
  #   Header: Accept: application/vnd.github+json
  #   Body:   {"event_type": "escala-update"}
  # Agende-o, p.ex., às 06h45 BRT (com margem para os ~3-5min de execução do job).
  #
  # FALLBACK: os crons abaixo continuam como rede de segurança. O GitHub atrasa/
  # enfileira crons (já atrasou 5h+ em hora cheia), por isso NÃO confiamos neles
  # para o SLA — quem garante as 07h15 é o gatilho externo. Minutos "quebrados"
  # (fora de :00) sofrem menos atraso.
  #  - 05h32 BRT (08h32 UTC) → reforço manhã
  #  - 06h32 BRT (09h32 UTC) → reforço manhã
  #  - 12h47 BRT (15h47 UTC) → meio-dia (troca de plantão)
  #  - 18h17 BRT (21h17 UTC) → fim de tarde (troca de plantão)
  repository_dispatch:
    types: [escala-update]

  schedule:
    - cron: '32 8 * * *'
    - cron: '32 9 * * *'
    - cron: '47 15 * * *'
    - cron: '17 21 * * *'

  # Permite execução manual para testes
  workflow_dispatch:

jobs:
  update-escala:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main

    - name: Limpar arquivos antigos de /tmp
      run: |
        echo "🗑️  Limpando /tmp de arquivos antigos de extraction..."
        rm -f /tmp/extracao_inteligente*.json
        rm -f /tmp/escalas*.json
        rm -f /tmp/dashboard*.html
        echo "✅ Arquivos antigos removidos"
        echo "⚠️  Nota: Extraction script usará apenas cache persistente (data/)"

    - name: Validar que workflow antigo foi deletado
      run: |
        if [ -f .github/workflows/atualizar-dashboard.yml ]; then
          echo "❌ ERRO: Workflow antigo ainda existe!"
          echo "❌ Deletar: .github/workflows/atualizar-dashboard.yml"
          exit 1
        fi
        echo "✅ Confirmado: Workflow antigo não existe"

    - name: Validar que health_check.py existe
      run: |
        if [ ! -f health_check.py ]; then
          echo "❌ ERRO: health_check.py não encontrado!"
          exit 1
        fi
        echo "✅ Confirmado: health_check.py existe"

    - name: Validar que data/fallback existe
      run: |
        if [ ! -d data ] || [ ! -f data/extracao_inteligente_sample.json ]; then
          echo "❌ ERRO: Fallback data não encontrado!"
          exit 1
        fi
        echo "✅ Confirmado: Fallback data existe"

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Instalar Chrome e ChromeDriver
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: stable

    - name: Atualizar Escala e Dashboard
      env:
        ESCALA_USERNAME: ${{ secrets.ESCALA_USERNAME }}
        ESCALA_PASSWORD: ${{ secrets.ESCALA_PASSWORD }}
      run: |
        python update_dashboard.py

    - name: Configurar Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Actions"

    - name: Commit e Push
      run: |
        if [ -f /tmp/dashboard_executivo.html ]; then
          cp /tmp/dashboard_executivo.html index.html
          mkdir -p docs
          cp /tmp/dashboard_executivo.html docs/index.html
          git add index.html docs/index.html data/
          if ! git diff --cached --quiet; then
            git commit -m "📊 Atualizar dashboard - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')"
            git push origin main
          else
            echo "Nenhuma mudança no dashboard"
          fi
        else
          echo "❌ Erro: arquivo dashboard não foi gerado"
          exit 1
        fi

    - name: Health Check
      if: always()
      run: |
        echo "🏥 Executando verificação de saúde..."
        python3 health_check.py || true

    - name: Upload de logs em caso de erro
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-logs
        path: /tmp/*.png
        retention-days: 7
