name: Buscar Contatos Faltantes

on:
  # Trigger manual pelo GitHub Actions
  workflow_dispatch:

jobs:
  scrape-contacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Instalar Chrome e ChromeDriver
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: stable

    - name: Buscar contatos faltantes
      env:
        ESCALA_USERNAME: ${{ secrets.ESCALA_USERNAME }}
        ESCALA_PASSWORD: ${{ secrets.ESCALA_PASSWORD }}
      run: |
        python scrape_contacts_missing.py

    - name: Configurar Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Actions"

    - name: Commit e Push se houve atualização
      run: |
        git add profissionais_autenticacao.json
        if ! git diff --cached --quiet; then
          git commit -m "📞 Atualizar contatos faltantes - $(date '+%d/%m/%Y %H:%M')"
          git push origin main
          echo "✅ Contatos atualizados e publicados"
        else
          echo "ℹ️  Nenhum contato novo encontrado nesta execução"
        fi

    - name: Upload screenshot em caso de erro
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshots
        path: /tmp/*.png
        retention-days: 7
